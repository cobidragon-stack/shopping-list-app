<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #f7f7fb;
      --card: #ffffff;
      --text: #1f2330;
      --muted: #8b90a0;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --danger: #ef4444;
      --border: #e5e7eb;
      --check: #10b981;
      --shadow: 0 10px 30px rgba(31, 35, 48, 0.08);
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
        "Malgun Gothic", "맑은 고딕", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px;
    }

    .app {
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 28px 24px;
    }

    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .count {
      font-size: 13px;
      color: var(--muted);
    }

    form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 14px;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    button {
      cursor: pointer;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      border-radius: 10px;
      border: none;
      transition: background 0.15s, transform 0.05s;
    }

    button:active { transform: translateY(1px); }

    .btn-add {
      padding: 12px 18px;
      background: var(--primary);
      color: #fff;
    }

    .btn-add:hover { background: var(--primary-hover); }

    .btn-add:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 4px;
      border-bottom: 1px solid var(--border);
    }

    li:last-child { border-bottom: none; }

    .check {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .check.done {
      background: var(--check);
      border-color: var(--check);
    }

    .check.done::after {
      content: "";
      width: 6px;
      height: 11px;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    .item-text {
      flex: 1;
      font-size: 15px;
      word-break: break-word;
    }

    li.done .item-text {
      color: var(--muted);
      text-decoration: line-through;
    }

    .btn-delete {
      width: 32px;
      height: 32px;
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      font-size: 18px;
      line-height: 1;
      padding: 0;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      background: #fee2e2;
      color: var(--danger);
    }

    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 32px 0;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
    }

    .btn-clear {
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      padding: 6px 10px;
    }

    .btn-clear:hover { color: var(--danger); }
  </style>
</head>
<body>
  <main class="app">
    <div class="header">
      <h1>🛒 쇼핑 리스트</h1>
      <span class="count" id="count">0개</span>
    </div>

    <form id="add-form" autocomplete="off">
      <input
        type="text"
        id="input"
        placeholder="추가할 아이템을 입력하세요"
        maxlength="100"
        required
      />
      <button type="submit" class="btn-add">추가</button>
    </form>

    <ul id="list"></ul>

    <p class="empty" id="empty">아직 추가된 아이템이 없습니다.</p>

    <div class="footer">
      <button type="button" id="clear-done" class="btn-clear" hidden>
        체크된 항목 모두 삭제
      </button>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "shopping-list-items";

    const listEl = document.getElementById("list");
    const emptyEl = document.getElementById("empty");
    const formEl = document.getElementById("add-form");
    const inputEl = document.getElementById("input");
    const countEl = document.getElementById("count");
    const clearDoneEl = document.getElementById("clear-done");

    let items = loadItems();

    function loadItems() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveItems() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function render() {
      listEl.innerHTML = "";

      if (items.length === 0) {
        emptyEl.hidden = false;
        clearDoneEl.hidden = true;
      } else {
        emptyEl.hidden = true;
      }

      const doneCount = items.filter((i) => i.done).length;
      const totalCount = items.length;
      countEl.textContent =
        totalCount === 0 ? "0개" : `${doneCount} / ${totalCount}개 완료`;

      clearDoneEl.hidden = doneCount === 0;

      for (const item of items) {
        const li = document.createElement("li");
        if (item.done) li.classList.add("done");

        const checkBtn = document.createElement("span");
        checkBtn.className = "check" + (item.done ? " done" : "");
        checkBtn.setAttribute("role", "checkbox");
        checkBtn.setAttribute("aria-checked", String(item.done));
        checkBtn.tabIndex = 0;
        checkBtn.addEventListener("click", () => toggleItem(item.id));
        checkBtn.addEventListener("keydown", (e) => {
          if (e.key === " " || e.key === "Enter") {
            e.preventDefault();
            toggleItem(item.id);
          }
        });

        const text = document.createElement("span");
        text.className = "item-text";
        text.textContent = item.text;

        const del = document.createElement("button");
        del.type = "button";
        del.className = "btn-delete";
        del.textContent = "×";
        del.title = "삭제";
        del.setAttribute("aria-label", `${item.text} 삭제`);
        del.addEventListener("click", () => deleteItem(item.id));

        li.append(checkBtn, text, del);
        listEl.appendChild(li);
      }
    }

    function addItem(text) {
      const trimmed = text.trim();
      if (!trimmed) return;
      items.unshift({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        text: trimmed,
        done: false,
      });
      saveItems();
      render();
    }

    function toggleItem(id) {
      const item = items.find((i) => i.id === id);
      if (!item) return;
      item.done = !item.done;
      saveItems();
      render();
    }

    function deleteItem(id) {
      items = items.filter((i) => i.id !== id);
      saveItems();
      render();
    }

    function clearDone() {
      const remaining = items.filter((i) => !i.done);
      if (remaining.length === items.length) return;
      items = remaining;
      saveItems();
      render();
    }

    formEl.addEventListener("submit", (e) => {
      e.preventDefault();
      addItem(inputEl.value);
      inputEl.value = "";
      inputEl.focus();
    });

    clearDoneEl.addEventListener("click", clearDone);

    render();
  </script>
</body>
</html>
